<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery | Mar y Fuego</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111111;
color:white;
font-family:'Poppins',sans-serif;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 6%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.05);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-family:'Cinzel',serif;
font-weight:bold;
color:#D4A017;
}

.logo span{
color:#FF6B00;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:white;
transition:0.3s;
}

nav ul li a:hover{
color:#FF6B00;
}

/* SECTION */

section{
padding:150px 8% 100px;
}

.title{
text-align:center;
margin-bottom:60px;
}

.title h2{
font-size:55px;
font-family:'Cinzel',serif;
color:#D4A017;
margin-bottom:15px;
}

.title p{
color:#bbb;
font-size:18px;
line-height:1.8;
}

/* CARRITO */

.cart-container{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
}

.cart-items{
background:#1b1b1b;
padding:35px;
border-radius:20px;
border:1px solid #222;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
border-bottom:1px solid #333;
gap:20px;
}

.cart-item-info h3{
color:#FF6B00;
margin-bottom:5px;
}

.cart-item-info p{
color:#bbb;
}

.cart-buttons{
display:flex;
align-items:center;
gap:10px;
}

.cart-buttons button{
width:35px;
height:35px;
border:none;
border-radius:10px;
background:#FF6B00;
color:white;
font-weight:bold;
cursor:pointer;
}

.remove-btn{
background:#aa2222 !important;
}

.cart-summary{
background:#1b1b1b;
padding:35px;
border-radius:20px;
height:fit-content;
border:1px solid #222;
}

.cart-summary h3{
font-size:30px;
color:#D4A017;
margin-bottom:25px;
}

.total{
font-size:28px;
color:#FF6B00;
margin-bottom:30px;
font-weight:bold;
}

/* FORM */

.form-group{
margin-bottom:20px;
}

.form-group input,
.form-group textarea{
width:100%;
padding:16px;
background:#222;
border:1px solid #333;
border-radius:14px;
color:white;
outline:none;
font-size:15px;
}

.form-group textarea{
height:120px;
resize:none;
}

.form-group input:focus,
.form-group textarea:focus{
border:1px solid #FF6B00;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#FF6B00;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#D4A017;
}

/* EMPTY */

.empty-cart{
text-align:center;
color:#888;
padding:40px 0;
}

/* FOOTER */

footer{
background:#0b0b0b;
padding:30px;
text-align:center;
color:#777;
margin-top:80px;
}

/* RESPONSIVE */

@media(max-width:950px){

nav{
flex-direction:column;
gap:15px;
}

nav ul{
flex-wrap:wrap;
justify-content:center;
gap:18px;
}

section{
padding:200px 5% 80px;
}

.title h2{
font-size:42px;
}

.cart-container{
grid-template-columns:1fr;
}

.cart-item{
flex-direction:column;
align-items:flex-start;
}

}
/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 6%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.05);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

.logo{
font-size:30px;
font-family:'Cinzel',serif;
font-weight:bold;
color:#D4A017;
}

.logo span{
color:#FF6B00;
}

#nav-links{
display:flex;
gap:25px;
list-style:none;
}

#nav-links li a{
text-decoration:none;
color:white;
transition:0.3s;
}

#nav-links li a:hover{
color:#FF6B00;
}

/* BOTON MENU */

.menu-toggle{
display:none;
font-size:34px;
cursor:pointer;
color:white;
}

/* MOBILE */

@media(max-width:900px){

.menu-toggle{
display:block;
}

#nav-links{
position:absolute;
top:80px;
right:0;
width:100%;
background:#151515;
flex-direction:column;
align-items:center;
padding:30px 0;
gap:25px;
display:none;
border-radius:0 0 20px 20px;
}

#nav-links.active{
display:flex;
}

section{
padding-top:180px;
}

}
</style>

<header>

<nav>

<div class="logo">
MAR <span>Y FUEGO</span>
</div>

<div class="menu-toggle" onclick="toggleMenu()">
☰
</div>

<ul id="nav-links">

<li><a href="index.html">Inicio</a></li>
<li><a href="nosotros.html">Nosotros</a></li>
<li><a href="menu.html">Menú</a></li>
<li><a href="reservas.html">Reservas</a></li>
<li><a href="delivery.html">Delivery</a></li>
<li><a href="contacto.html">Contacto</a></li>

</ul>

</nav>

</header>

<section>

<div class="title">

<h2>Tu Pedido</h2>

<p>
Revisa tus productos y confirma tu pedido.
</p>

</div>

<div class="cart-container">

<!-- PRODUCTOS -->

<div class="cart-items">

<div id="cart-items">

</div>

</div>

<!-- RESUMEN -->

<div class="cart-summary">

<h3>Resumen</h3>

<div class="total" id="total">
Q0
</div>

<div class="form-group">
<input type="text" placeholder="Nombre Completo">
</div>

<div class="form-group">
<input type="tel" placeholder="Número de Teléfono">
</div>

<div class="form-group">
<input type="text" placeholder="Dirección">
</div>

<div class="form-group">
<textarea placeholder="Detalles adicionales"></textarea>
</div>

<button class="btn">
Confirmar Pedido
</button>

</div>

</div>

</section>

<footer>

© 2026 Mar y Fuego Restaurante - Todos los derechos reservados

</footer>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

const cartItems = document.getElementById("cart-items");
const totalElement = document.getElementById("total");

function renderCart(){

cartItems.innerHTML = "";

let total = 0;

if(carrito.length === 0){

cartItems.innerHTML = `
<div class="empty-cart">
<h2>No hay productos en el carrito</h2>
</div>
`;

totalElement.innerHTML = "Q0";

return;

}

carrito.forEach((producto,index)=>{

total += producto.precio * producto.cantidad;

cartItems.innerHTML += `

<div class="cart-item">

<div class="cart-item-info">

<h3>${producto.nombre}</h3>

<p>
Q${producto.precio} x ${producto.cantidad}
</p>

</div>

<div class="cart-buttons">

<button onclick="decreaseQuantity(${index})">
-
</button>

<button onclick="increaseQuantity(${index})">
+
</button>

<button class="remove-btn"
onclick="removeItem(${index})">
X
</button>

</div>

</div>

`;

});

totalElement.innerHTML = "Q" + total;

localStorage.setItem("carrito", JSON.stringify(carrito));

}

function increaseQuantity(index){

carrito[index].cantidad++;

renderCart();

}

function decreaseQuantity(index){

if(carrito[index].cantidad > 1){

carrito[index].cantidad--;

}else{

carrito.splice(index,1);

}

renderCart();

}

function removeItem(index){

carrito.splice(index,1);

renderCart();

}

renderCart();

</script>
<script>

function toggleMenu(){

document.getElementById("nav-links")
.classList.toggle("active");

}

</script>
</body>

</html>
